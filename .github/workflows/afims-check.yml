name: AFIMS Check

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  executable-conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install --disable-pip-version-check -e .
      - name: Execute AFIMS-T and local release gates
        run: ./scripts/test.sh | tee evidence/ci-tests.log
      - name: Build deterministic file manifest
        run: python -m scripts.build_release_manifest
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: afims-r-local-evidence
          if-no-files-found: error
          path: |
            evidence/
            reports/
            RELEASE_MANIFEST.json
            SHA256SUMS.txt
